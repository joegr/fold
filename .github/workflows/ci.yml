name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

# ────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Lint & unit tests ────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from template
        run: cp .env.example .env

      - name: Build test image
        run: docker compose build test

      - name: Run unit tests
        run: docker compose run --rm test

  # ── 2. Build, smoke-test, push ──────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    # Only push on main branch (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Create .env from template
        run: cp .env.example .env

      # ── Smoke test before pushing ───────────────────────────
      - name: Build production image (local tag)
        run: docker compose build app

      - name: Smoke-test production container
        run: |
          docker compose up app -d
          sleep 5
          curl -sf http://localhost:5000/api/status | grep '"status":"online"'
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:5000/ | grep 200
          docker compose down

      # ── Push to GHCR ────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
